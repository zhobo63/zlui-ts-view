<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zlui-ts View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <!-- Top toolbar -->
    <div id="toolbar">
        <span class="title">zlui-ts View</span>
    </div>

    <!-- Main three-column layout -->
    <div id="main">
        <!-- Left panel: scale, file list, object tree -->
        <div id="left-panel" class="panel left">
            <div class="section">
                <label>縮放</label>
                <div class="scale-row">
                    <span id="scale-value">100</span>%
                    <input type="range" id="scale-slider" min="10" max="1000" value="100" step="10" />
                </div>
                <div class="scale-presets">
                    <button data-scale="25">25%</button>
                    <button data-scale="50">50%</button>
                    <button data-scale="100">100%</button>
                    <button data-scale="200">200%</button>
                    <button data-scale="400">400%</button>
                </div>
            </div>

            <div class="section file-section">
                <label>檔案列表 <button id="clear-btn" title="清空上傳檔案"><i class="fa-solid fa-trash-can"></i></button></label>
                <ul id="file-list"></ul>
            </div>

            <div class="section object-tree-section">
                <label>物件樹</label>
                <ul id="object-tree"></ul>
            </div>
        </div>

        <!-- Center: Canvas render area -->
        <div id="canvas-area" class="panel center">
            <canvas id="render-canvas"></canvas>
            <div id="scroll-v" class="scrollbar vertical"><div class="scrollbar-thumb"></div></div>
            <div id="scroll-h" class="scrollbar horizontal"><div class="scrollbar-thumb"></div></div>
        </div>

        <!-- Right panel: property editor -->
        <div id="right-panel" class="panel right">
            <div class="section">
                <label>屬性</label>
                <div id="properties-content">
                    <p class="placeholder">選擇物件以顯示屬性</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Webpack bundle -->
    <script src="/main.js"></script>
</body>
</html>
